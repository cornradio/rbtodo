<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RB Todo - Minimalist Productivity</title>
    <!-- CSS Split for stability -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/todo.css">
    <link rel="stylesheet" href="css/editor.css">
    <link rel="stylesheet" href="css/overlay.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="RB Todo">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/4481/4481307.png">
</head>

<body class="light-mode">
    <div class="app-container" id="app">
        <!-- Mobile Header (Visible only on mobile) -->
        <header class="mobile-top-bar" id="mobile-top-bar">
            <button id="mobile-menu-btn" class="icon-btn">☰</button>
            <div class="mobile-app-title">RB Todo</div>
            <button id="mobile-search-btn" class="icon-btn">🔍</button>
        </header>

        <!-- Sidebar: Timeline & Calendar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-toggle-persistent" id="toggle-sidebar-persistent" title="Toggle Sidebar (Ctrl+B)">
                <div class="toggle-anchor"></div>
            </div>
            <div class="sidebar-header">
                <div class="search-container">
                    <input type="text" id="search-input" placeholder="Search (Ctrl+Shift+P)...">
                </div>
                <button id="theme-toggle" class="icon-btn">🌓</button>
            </div>

            <div class="sidebar-content-top">
                <div class="sidebar-section">
                    <div class="sidebar-section-header">
                        <div class="sidebar-section-title">TIMELINE</div>
                        <button id="export-week-btn" class="export-btn">Export</button>
                    </div>
                    <div id="timeline" class="timeline-container">
                        <!-- Timeline items will be injected here -->
                    </div>
                </div>
            </div>

            <div class="sidebar-bottom">
                <div class="sidebar-section-title" style="margin-bottom: 12px;">CALENDAR</div>
                <div id="calendar" class="calendar-container">
                    <!-- Calendar will be injected here -->
                </div>
            </div>
        </aside>

        <!-- Main Content: Todo List -->
        <main class="todo-list-section" id="todo-list-section">
            <section class="section-group">
                <header class="section-header">
                    <h2>OLD TODOS (UNFINISHED)</h2>
                </header>
                <div id="old-todos-list" class="todo-items-container">
                    <!-- Old todos will be injected here -->
                </div>
            </section>

            <section class="section-group">
                <header class="section-header">
                    <h2 id="current-date-title">TODAY'S TODOS</h2>
                    <button id="add-todo-btn" class="add-btn">+ New Todo</button>
                </header>
                <div id="today-todos-list" class="todo-items-container">
                    <!-- Today's todos will be injected here -->
                </div>
            </section>
        </main>

        <!-- Resize Handle -->
        <div class="resizer hidden" id="resizer"></div>

        <!-- Right Pane: Detail & Editor -->
        <section class="editor-section hidden-right" id="editor-section">
            <div id="editor-placeholder" class="editor-placeholder">
                <p>Select a todo or create a new one to start editing.</p>
            </div>
            <div id="editor-container" class="editor-container hidden">
                <input type="text" id="todo-title-input" placeholder="Todo Title..." class="title-input">

                <div id="todo-content-editor" contenteditable="true" class="content-editor"
                    placeholder="Start typing content here..."></div>

                <div class="editor-footer-container">
                    <div class="editor-actions-bottom">
                        <button id="fullscreen-editor" class="icon-btn" title="Full Screen (Ctrl+Shift+F)">⛶</button>
                        <label for="image-upload" class="icon-btn upload-btn" title="Upload Image">🖼️
                            <input type="file" id="image-upload" accept="image/*" style="display: none;">
                        </label>
                        <button id="delete-todo" class="icon-btn delete-btn" title="Delete (Permanently)">🗑️</button>
                        <button id="close-editor" class="icon-btn" title="Close">✕</button>
                    </div>
                    <div class="save-status-box">
                        <span id="save-status">Saved</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Search Results Overlay -->
        <div id="search-overlay" class="search-overlay hidden">
            <div class="search-results-window">
                <div class="search-results-header">
                    <h3>Search Results</h3>
                    <button id="close-search" class="icon-btn">✕</button>
                </div>
                <div id="search-results-list" class="search-results-list">
                    <!-- Results will be injected here -->
                </div>
            </div>
        </div>

        <!-- Export Modal -->
        <div id="export-modal" class="search-overlay hidden">
            <div class="search-results-window">
                <div class="search-results-header">
                    <h3>Weekly Export</h3>
                    <div class="header-btns">
                        <button id="copy-export" class="add-btn">Copy Text</button>
                        <button id="close-export" class="icon-btn">✕</button>
                    </div>
                </div>
                <div class="export-content">
                    <textarea id="export-textarea" readonly></textarea>
                </div>
            </div>
        </div>
    </div>

    <div id="drawer-backdrop" class="drawer-backdrop hidden"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/isoWeek.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/weekOfYear.js"></script>
    <script>
        dayjs.extend(window.dayjs_plugin_isoWeek);
        dayjs.extend(window.dayjs_plugin_weekOfYear);
    </script>
    <script src="app.js"></script>
</body>

</html>
